services:

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  cache-node-1:
    build: .
    environment:
      SERVER_PORT: 8080
      NODE_ID: cache-node-1
      REDIS_HOST: redis
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  cache-node-2:
    build: .
    environment:
      SERVER_PORT: 8080
      NODE_ID: cache-node-2
      REDIS_HOST: redis
    ports:
      - "8081:8080"
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  cache-node-3:
    build: .
    environment:
      SERVER_PORT: 8080
      NODE_ID: cache-node-3
      REDIS_HOST: redis
    ports:
      - "8082:8080"
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure